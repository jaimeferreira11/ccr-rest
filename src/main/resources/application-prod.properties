server.servlet.context-path=/ccr-rest-api

# APPLICATION SERVER
server.port=8051

# Tomcat threads
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=50

# Compresión HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=2048

#JWT KEY
jwt.key.public=mySecretKey
jwt.key.private=jWmZq4t7w!z%C*F-JaNdRgUkXp2r5u8x/A?D(G+KbPeShVmYq3t6v9y$B&E)H@Mc

#JWT TIME
jwt.key.time.millis=43200000


##SWAGGER
springdoc.api-docs.path=/swagger-ui
springdoc.paths-to-exclude=/v1/**, /v2/**, /v3/**, /swagger-resources/**


# PostgreSQL connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/ccr
spring.datasource.username=ccr
spring.datasource.password=ccr

env.active=prod

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database=default
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.format_sql=false
# Evitar retener conexiones DB durante toda la request HTTP
spring.jpa.open-in-view=false

# HikariCP connection pool (prod)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=CcrHikariPool

# LOG - nivel INFO en prod (sin debug SQL)
logging.pattern.console=%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
logging.level.root=INFO
logging.level.py.com.jaimeferreira.ccr=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.jdbc.core.JdbcTemplate=WARN
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=WARN
logging.file.name=./log/ccr-api-rest.log

# Paths - Windows (prod)
path.directory.server=c:\\ccr_zoomin
path.directory.server_path_images=\\images\\
path.directory.main_imagenes=c:\\ccr_zoomin\\images\\

path.directory.server_path_images_items=\\zoomin-bebidas\\items

path.directory.server_path_images_nestle=zoomin-nestle
path.directory.server_path_images_items_nestle=zoomin-nestle/items
path.directory.server_path_images_externo_nestle=zoomin-nestle/externo

path.directory.server_path_images_scj=zoomin-jhonson
path.directory.server_path_images_items_scj=zoomin-jhonson/items
path.directory.server_path_images_externo_scj=zoomin-jhonson/externo

path.directory.server_path_images_shell=zoomin-shell
path.directory.server_path_reports_insights=insights\\reportes
path.directory.server_path_templates_insights=insights\\templates
path.directory.server_path_clientes_insights=insights\\clientes

# Multipart upload — streaming a disco en lugar de RAM para archivos grandes
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
spring.servlet.multipart.file-size-threshold=5MB
spring.servlet.multipart.location=C:\\Temp\\ccr-uploads

